<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner Absen</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>Scan QR untuk Absen</h2>
<label for="guru">Pilih Guru:</label>
<select id="guru">
  <option value="">-- Pilih Guru --</option>
  <option value="Ust. Ridwan Hakim">Ust. Ridwan Hakim</option>
</select>
<br><br>
<div id="reader" style="width:300px;"></div>

<script>
let lastScan = "";

function onScanSuccess(decodedText, decodedResult) {
    if (decodedText === lastScan) return;
    lastScan = decodedText;

    alert("Hasil scan: " + decodedText);

    fetch("https://https://script.google.com/macros/s/AKfycbzuqB4V7NpFaFz9l2Av9kAx5_HISrj7xBkVh-PXcL2XoM0AQlinOtbKWJ-RLrYrBZDDhQ/exec", {
  method: "POST",
  headers: {
    "Content-Type": "application/x-www-form-urlencoded"
  },
  body: "action=saveAttendance"
        + "&qrText=" + encodeURIComponent(decodedText)
        + "&guru=" + encodeURIComponent(document.getElementById("guru").value)
})
.then(response => response.text())
.then(result => {
  console.log("Respon:", result);
  alert("Data berhasil dikirim ke Google Sheets");
})
.catch(error => {
  console.error("Error:", error);
  alert("Gagal kirim ke Google Sheets");
});

    setTimeout(() => {
        lastScan = "";
    }, 3000);
}
let scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>

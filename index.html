<!DOCTYPE html>
<html>
<head>
    <title>QR Scanner Absen</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<h2>Scan QR untuk Absen</h2>
<label for="guru">Pilih Guru:</label>
<select id="guru">
  <option value="">-- Pilih Guru --</option>
  <option value="Ust. Ridwan Hakim">Ust. Ridwan Hakim</option>
</select>
<br><br>
<div id="reader" style="width:300px;"></div>

<script>
let lastScan = "";

function onScanSuccess(decodedText, decodedResult) {
    if (decodedText === lastScan) return;
    lastScan = decodedText;

    alert("Hasil scan: " + decodedText);

    const url = "https://script.google.com/macros/s/AKfycbzuqB4V7NpFaFz9l2Av9kAx5_HISrj7xBkVh-PXcL2XoM0AQlinOtbKWJ-RLrYrBZDDhQ/exec";

const params =
  "?action=saveAttendance" +
  "&qrText=" + encodeURIComponent(decodedText) +
  "&guru=" + encodeURIComponent(document.getElementById("guru").value);

fetch(url + params, { method: "GET", mode: "no-cors" })
  .then(() => {
    alert("Absen berhasil!");
  })
  .catch(error => {
    alert("Gagal kirim data!");
    console.error(error);
  });
    setTimeout(() => {
        lastScan = "";
    }, 3000);
}
let scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 }
);

scanner.render(onScanSuccess);
</script>

</body>
</html>
